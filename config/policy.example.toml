version = 1

[clients.local_cli]
unix_user = "dev"
allowed_capabilities = ["read_basic", "service_read"]

[actions]
allowed = [
  "system.status",
  "system.health",
  "resource.snapshot",
  "disk.usage",
  "network.interface_status",
  "service.status",
]
denied = []

# Opt-in only after explicit local security review:
# - add "read_sensitive" only for trusted incident operators
# - add "journal.query" only when journald exposure is really needed
# - add "process.snapshot" only when process-level diagnostics are required
# - add "service.restart" only together with "service_control"

[service_control]
allowed_units = ["nginx.service"]
restart_cooldown_seconds = 300
max_restarts_per_hour = 3

[constraints]
default_timeout_ms = 3000
max_timeout_ms = 30000
journal_limit_max = 200
process_limit_max = 50
max_parallel_mutations = 1
